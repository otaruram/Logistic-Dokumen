  <!-- FAQ Rich Snippets for Google -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "What is OtaruChain?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "OtaruChain is a free AI-powered document management platform that transforms physical documents into actionable digital data. It uses advanced AI (GPT-4o, Tesseract OCR) to scan, extract text, detect fraud, and generate structured financial data from receipts, invoices, and logistics documents."
        }
      },
      {
        "@type": "Question",
        "name": "Is OtaruChain free to use?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, OtaruChain is completely free forever. Users get 10 credits per day that reset automatically at midnight. Each document scan (default or fraud detection) costs 1 credit. The Otaru AI chatbot is also free to use."
        }
      },
      {
        "@type": "Question",
        "name": "What types of documents can OtaruChain scan?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "OtaruChain can scan and process invoices, receipts, delivery notes (surat jalan), logistics documents, financial statements, and any text-based document in image format (JPG, PNG) or PDF files. It automatically extracts key data like amounts, dates, and recipient information."
        }
      },
      {
        "@type": "Question",
        "name": "How does the fraud detection feature work?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "OtaruChain uses cryptographic digital signature hashing to verify document authenticity. When a document is scanned with fraud detection enabled, the system creates a unique hash fingerprint. Any subsequent modifications to the document will be detected and flagged as 'Tampered', protecting you from document fraud."
        }
      },
      {
        "@type": "Question",
        "name": "What is Otaru AI Chatbot?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Otaru is an AI-powered chatbot built into OtaruChain that helps users analyze documents through natural conversation. You can upload images, PDFs, or DOCX files and ask questions about their content. Otaru processes files in memory without storing them on the server, ensuring your data privacy."
        }
      },
      {
        "@type": "Question",
        "name": "Is my data safe with OtaruChain?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes. OtaruChain processes uploaded files in memory and discards them after analysis. Chat messages are stored securely in Supabase with row-level security. Uploaded files are never stored on the server. Data is automatically cleaned up every 30 days for additional security."
        }
      },
      {
        "@type": "Question",
        "name": "Can I backup my scans to Google Drive?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, OtaruChain integrates with Google Drive. After scanning a document, you can export your scan results directly to your personal Google Drive for safekeeping and easy access across devices."
        }
      }
    ]
  }
  </script>
