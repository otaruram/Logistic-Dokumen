name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
    paths:
      - 'be/**'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Execute Deployment Script via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "Starting deployment process..."
            
            # Navigate to the project directory or clone it if it doesn't exist
            if [ ! -d "/root/Logistic-Dokumen" ]; then
              echo "Cloning repository..."
              cd /root
              # Replace with actual PAT if repo is private, assuming public or already authenticated for pull
              git clone https://github.com/otaruram/Logistic-Dokumen.git
              cd Logistic-Dokumen
            else
              echo "Directory exists, pulling latest changes..."
              cd /root/Logistic-Dokumen
              # Discard any local modifications to prevent merge conflicts
              git checkout -- .
              git pull origin main
            fi
            
            # Ensure the be/.env file exists
            if [ ! -f "be/.env" ]; then
              echo "⚠️ WARNING: be/.env file is missing! Please create it manually on the VPS."
            fi
            
            # Rebuild and restart the Docker containers
            echo "Rebuilding and restarting Docker containers..."
            docker compose down --remove-orphans
            docker compose build backend
            docker compose up -d
            
            # Clean up old Docker images to save disk space
            echo "Cleaning up old Docker images..."
            docker image prune -f
            docker builder prune -f --filter "until=24h"
            
            # Check status
            docker ps | grep logistic-document
            df -h / | tail -1
            
            echo "✅ Deployment completed successfully!"
